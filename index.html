<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday</title>

    <style>
    body{
        background-image: url("background.jpg");
        background-size: cover;
        background-position: center;
        text-align: center;
        margin: 0;
        font-family: Arial;
        color: white;
    }

    h1{
        margin-top: 20px;
    }

    img{
        border-radius: 15px;
        margin-top: 10px;
    }

    button{
        background-color: hotpink;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        margin: 10px;
    }

    button:hover{
        background-color: deeppink;
    }

    .heart {
        position: fixed;
        top: -10px;
        color: hotpink;
        font-size: 20px;
        animation: fall linear forwards;
    }

    @keyframes fall {
        to {
            transform: translateY(100vh);
            opacity: 0;
        }
    }
    </style>
</head>

<body>

<h1>🎂 Happy Birthday Bestie 🎂</h1>

<img src="cake.jpg" width="250">

<p>
    Dear Best Friend,<br><br>
    May Allah bless you with happiness, success and good health.<br>
    Thank you for always being there for me. 💖
</p>

<!-- MUSIC -->
<audio id="bgMusic" loop>
    <source src="birthday.mp3" type="audio/mpeg">
</audio>

<!-- BUTTON -->
<button onclick="playMusic()">🎶 Play Music</button>

<button onclick="openWish()">💌 A Little Wish For You</button>

<h2 id="birthdayMessage"></h2>

<script>
function playMusic(){
    document.getElementById("bgMusic").play();
}

function showMessage(){
    document.getElementById("birthdayMessage").innerHTML =
    "💖 Happy Birthday My Dear Best Friend! 💖<br><br>" +
    "May Allah fill your life with happiness, success & blessings ✨<br><br>" +    
    "Enjoy your special day 🎉🎂";
}
</script>

<script>
function openWish(){
    window.open("wish.html", "_blank");
}
</script>

<script>
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
